name: Forge Cleanup

on: workflow_dispatch

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ secrets.TS_TAGS }}
          ping: ${{ secrets.DEPLOY_HOST }}
          version: latest

      - name: Stop containers and remove deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            APP_DIR={{DEPLOY_ROOT}}/${{ github.event.repository.name }}

            if [ ! -d "$APP_DIR" ]; then
              echo "Nothing to clean: $APP_DIR does not exist"
              exit 0
            fi

            cd "$APP_DIR/docker/compose" 2>/dev/null || true
            if [ -f docker-compose.yml ]; then
              echo "Stopping containers..."
              docker compose down --remove-orphans --volumes 2>/dev/null || true
            fi

            echo "Removing $APP_DIR..."
            rm -rf "$APP_DIR"
            echo "Deployment cleaned: $APP_DIR"
