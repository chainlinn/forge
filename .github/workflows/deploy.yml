name: forge / deploy

on:
  workflow_call:

env:
  APP_NAME_RAW: ${{ github.event.repository.name }}

jobs:
  # ── Build amd64 on standard runner ──
  forge-build-amd64:
    name: forge-build-amd64
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.sanitize.outputs.APP_NAME }}
      app_dir: ${{ steps.sanitize.outputs.APP_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sanitize names
        id: sanitize
        run: |
          echo "APP_NAME=$(echo '${{ env.APP_NAME_RAW }}' | tr '[:upper:]' '[:lower:]')" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
          echo "APP_DIR=${{ secrets.DEPLOY_ROOT }}/$(echo '${{ env.APP_NAME_RAW }}' | tr '[:upper:]' '[:lower:]')" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build and push amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:dev-amd64
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}-amd64

  # ── Build arm64 on native ARM runner ──
  forge-build-arm64:
    name: forge-build-arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sanitize names
        run: |
          echo "APP_NAME=$(echo '${{ env.APP_NAME_RAW }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "APP_DIR=${{ secrets.DEPLOY_ROOT }}/$(echo '${{ env.APP_NAME_RAW }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build and push arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          provenance: false
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:dev-arm64
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}-arm64

  # ── Merge manifests → unified :dev and :sha tags ──
  forge-merge:
    name: forge-merge
    runs-on: ubuntu-latest
    needs: [forge-build-amd64, forge-build-arm64]
    outputs:
      app_name: ${{ needs.forge-build-amd64.outputs.app_name }}
      app_dir: ${{ needs.forge-build-amd64.outputs.app_dir }}
    steps:
      - name: Sanitize names
        run: |
          echo "APP_NAME=${{ needs.forge-build-amd64.outputs.app_name }}" >> $GITHUB_ENV
          echo "APP_DIR=${{ needs.forge-build-amd64.outputs.app_dir }}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Merge platform manifests
        run: |
          IMG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}"
          SHA="${{ github.sha }}"
          docker buildx imagetools create -t "$IMG:dev" -t "$IMG:$SHA" \
            "$IMG:dev-amd64" \
            "$IMG:dev-arm64"

  # ── Deploy ──
  forge-deploy:
    name: forge-deploy
    needs: forge-merge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sanitize names
        run: |
          echo "APP_NAME=${{ needs.forge-merge.outputs.app_name }}" >> $GITHUB_ENV
          echo "APP_DIR=${{ needs.forge-merge.outputs.app_dir }}" >> $GITHUB_ENV

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ secrets.TS_TAGS }}
          ping: ${{ secrets.DEPLOY_HOST }}
          version: latest

      - name: Ensure app directories exist
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            APP_DIR=${{ secrets.DEPLOY_ROOT }}/$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
            mkdir -p "$APP_DIR/data" "$APP_DIR/docker/compose"

      - name: Copy compose + hooks to NAS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,.forge/**"
          target: ${{ env.APP_DIR }}/docker/compose/
          strip_components: 0

      - name: Deploy via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}/docker/compose
            export APP_NAME="${{ env.APP_NAME }}" APP_DIR="${{ env.APP_DIR }}" DATA_DIR="${{ env.APP_DIR }}/data"
            echo '${{ secrets.FORGE_ENV }}' > /tmp/forge-env && set -a && source /tmp/forge-env && set +a
            [ -f .forge/hooks/env/load-env.sh ] && source .forge/hooks/env/load-env.sh
            mkdir -p "$DATA_DIR"

            if [ -f .forge/hooks/events/pre-deploy.sh ]; then
              echo "→ Running pre-deploy hook..."
              bash .forge/hooks/events/pre-deploy.sh
            fi

            printf '%s' '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin
            docker compose -p "$APP_NAME" pull
            docker compose -p "$APP_NAME" up -d --remove-orphans
            docker compose -p "$APP_NAME" ps

            if [ -f .forge/hooks/events/post-deploy.sh ]; then
              echo "→ Running post-deploy hook..."
              bash .forge/hooks/events/post-deploy.sh
            fi
