name: forge / deploy

on:
  workflow_call:

env:
  APP_NAME_RAW: ${{ github.event.repository.name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sanitize names (Docker Hub requires lowercase)
        run: |
          echo "APP_NAME=$(echo '${{ env.APP_NAME_RAW }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "APP_DIR=${{ secrets.DEPLOY_ROOT }}/$(echo '${{ env.APP_NAME_RAW }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:dev
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sanitize names
        run: |
          echo "APP_NAME=$(echo '${{ env.APP_NAME_RAW }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "APP_DIR=${{ secrets.DEPLOY_ROOT }}/$(echo '${{ env.APP_NAME_RAW }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ secrets.TS_TAGS }}
          ping: ${{ secrets.DEPLOY_HOST }}
          version: latest

      - name: Ensure app directories exist
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            APP_DIR=${{ secrets.DEPLOY_ROOT }}/$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
            mkdir -p "$APP_DIR/data" "$APP_DIR/docker/compose"

      - name: Copy compose + hooks to NAS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,forge/**"
          target: ${{ env.APP_DIR }}/docker/compose/
          strip_components: 0

      - name: Deploy via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}/docker/compose
            export APP_NAME="${{ env.APP_NAME }}" APP_DIR="${{ env.APP_DIR }}" DATA_DIR="${{ env.APP_DIR }}/data"
            [ -f forge/hooks/load-env.sh ] && source forge/hooks/load-env.sh
            mkdir -p "$DATA_DIR"

            if [ -f forge/hooks/pre-deploy.sh ]; then
              echo "→ Running pre-deploy hook..."
              bash forge/hooks/pre-deploy.sh
            fi

            printf '%s' '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps

            if [ -f forge/hooks/post-deploy.sh ]; then
              echo "→ Running post-deploy hook..."
              bash forge/hooks/post-deploy.sh
            fi
