name: forge / deploy

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
        description: "Caller's repository name (github.event.repository.name)"

jobs:
  forge-build:
    name: forge-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sanitize name
        run: |
          echo "APP_NAME=$(echo '${{ inputs.repo }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:dev
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}

  forge-deploy:
    name: forge-deploy
    needs: forge-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sanitize name
        run: |
          echo "APP_NAME=$(echo '${{ inputs.repo }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "APP_DIR=${{ secrets.DEPLOY_ROOT }}/$(echo '${{ inputs.repo }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ secrets.TS_TAGS }}
          ping: ${{ secrets.DEPLOY_HOST }}
          version: latest
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            APP_DIR=${{ secrets.DEPLOY_ROOT }}/${{ env.APP_NAME }}
            mkdir -p "$APP_DIR/data" "$APP_DIR/docker/compose"
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,.forge/**"
          target: ${{ env.APP_DIR }}/docker/compose/
          strip_components: 0
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}/docker/compose
            export APP_NAME="${{ env.APP_NAME }}" APP_DIR="${{ env.APP_DIR }}" DATA_DIR="${{ env.APP_DIR }}/data"
            echo '${{ secrets.FORGE_ENV }}' > /tmp/forge-env && set -a && source /tmp/forge-env && set +a
            [ -f .forge/hooks/env/load-env.sh ] && source .forge/hooks/env/load-env.sh
            mkdir -p "$DATA_DIR"
            if [ -f .forge/hooks/events/pre-deploy.sh ]; then
              echo "→ Running pre-deploy hook..."
              bash .forge/hooks/events/pre-deploy.sh
            fi
            printf '%s' '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin
            docker compose -p "$APP_NAME" pull
            docker compose -p "$APP_NAME" up -d --remove-orphans
            docker compose -p "$APP_NAME" ps
            if [ -f .forge/hooks/events/post-deploy.sh ]; then
              echo "→ Running post-deploy hook..."
              bash .forge/hooks/events/post-deploy.sh
            fi
