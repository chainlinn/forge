name: forge / deploy

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
        description: "Caller's repository name (github.event.repository.name)"

jobs:
  # ── Build amd64 on standard runner ──
  forge-build-amd64:
    name: forge-build-amd64
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.name.outputs.APP_NAME }}
    steps:
      - uses: actions/checkout@v6
      - name: Sanitize
        id: name
        run: |
          echo "APP_NAME=$(echo '${{ inputs.repo }}' | tr '[:upper:]' '[:lower:]')" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:dev-amd64
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}-amd64

  # ── Build arm64 on native ARM runner ──
  forge-build-arm64:
    name: forge-build-arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Sanitize
        run: |
          echo "APP_NAME=$(echo '${{ inputs.repo }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          provenance: false
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:dev-arm64
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}-arm64

  # ── Merge manifests → unified :dev and :sha tags ──
  forge-merge:
    name: forge-merge
    runs-on: ubuntu-latest
    needs: [forge-build-amd64, forge-build-arm64]
    outputs:
      app_name: ${{ steps.name.outputs.APP_NAME }}
    steps:
      - name: Resolve name
        id: name
        run: |
          echo "APP_NAME=${{ needs.forge-build-amd64.outputs.app_name }}" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Merge manifests
        run: |
          IMG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}"
          docker buildx imagetools create -t "$IMG:dev" -t "$IMG:${{ github.sha }}" \
            "$IMG:dev-amd64" "$IMG:dev-arm64"

  # ── Deploy ──
  forge-deploy:
    name: forge-deploy
    needs: forge-merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          echo "APP_NAME=${{ needs.forge-merge.outputs.app_name }}" >> $GITHUB_ENV
          echo "APP_DIR=${{ secrets.DEPLOY_ROOT }}/${{ needs.forge-merge.outputs.app_name }}" >> $GITHUB_ENV
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ secrets.TS_TAGS }}
          ping: ${{ secrets.DEPLOY_HOST }}
          version: latest
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            APP_DIR=${{ secrets.DEPLOY_ROOT }}/${{ env.APP_NAME }}
            mkdir -p "$APP_DIR/data" "$APP_DIR/docker/compose"
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,.forge/**"
          target: ${{ env.APP_DIR }}/docker/compose/
          strip_components: 0
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}/docker/compose
            export APP_NAME="${{ env.APP_NAME }}" APP_DIR="${{ env.APP_DIR }}" DATA_DIR="${{ env.APP_DIR }}/data"
            echo '${{ secrets.FORGE_ENV }}' > /tmp/forge-env && set -a && source /tmp/forge-env && set +a
            [ -f .forge/hooks/env/load-env.sh ] && source .forge/hooks/env/load-env.sh
            mkdir -p "$DATA_DIR"
            if [ -f .forge/hooks/events/pre-deploy.sh ]; then
              echo "→ Running pre-deploy hook..."
              bash .forge/hooks/events/pre-deploy.sh
            fi
            printf '%s' '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin
            docker compose -p "$APP_NAME" pull
            docker compose -p "$APP_NAME" up -d --remove-orphans
            docker compose -p "$APP_NAME" ps
            if [ -f .forge/hooks/events/post-deploy.sh ]; then
              echo "→ Running post-deploy hook..."
              bash .forge/hooks/events/post-deploy.sh
            fi
